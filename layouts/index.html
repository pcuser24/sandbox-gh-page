{{ define "main" }}
<!-- Hero Section -->
<section class="bg-gradient-to-r from-indigo-600 to-violet-700 text-white py-20 px-4">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-5xl font-extrabold tracking-tight mb-6">Empowering Curious Minds</h1>
        <p class="text-xl text-indigo-100 max-w-2xl mx-auto mb-8">{{ .Params.subtitle }}</p>
        <a href="/classrooms/" class="bg-white text-indigo-600 font-semibold px-6 py-3 rounded-lg shadow-md hover:bg-indigo-50 transition">Explore Our Classrooms</a>
    </div>
</section>

<!-- Selling Points / Appealing Points Grid -->
<section class="max-w-6xl mx-auto px-4 py-16">
    <h2 class="text-3xl font-bold text-center text-slate-900 mb-12">Why Choose Our Learning Space?</h2>
    <div class="grid md:grid-cols-3 gap-8">
        {{ range .Params.selling_points }}
        <div class="bg-white p-8 rounded-xl shadow-xs border border-slate-100 hover:shadow-md transition">
            <div class="text-3xl mb-4">{{ .icon }}</div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">{{ .title }}</h3>
            <p class="text-slate-600">{{ .description }}</p>
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
