<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} | Teacher Site{{ end }}</title>

    <base href="{{ .Site.BaseURL }}">
    <!-- Hugo Pipeline to Compile Tailwind -->
    {{ with (templates.Defer (dict "key" "global")) }}
    {{ partial "css.html" . }}
    {{ end }}
</head>

<body class="bg-slate-50 text-slate-800 antialiased font-sans flex flex-col min-h-screen">

    <!-- Global Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-xs">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="" class="text-xl font-bold text-indigo-600">Classroom Hub</a>
            <div class="space-x-6 font-medium">
                <a href="classrooms/" class="hover:text-indigo-600 transition">Classrooms</a>
                <a href="about/" class="hover:text-indigo-600 transition">About</a>
                <a href="contact/" class="hover:text-indigo-600 transition">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Dynamic Layout Content Injection -->
    <main class="flex-grow">
        {{ block "main" . }}{{ end }}
    </main>

    <!-- Global Footer -->
    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 mt-12">
        <div class="max-w-6xl mx-auto px-4 text-center text-sm">
            &copy; {{ now.Format "2006" }} Classroom Hub. All rights reserved.
        </div>
    </footer>
</body>

</html>
