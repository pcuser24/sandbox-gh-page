{{ define "main" }}
<div class="bg-slate-100 py-12 border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-2">{{ .Title }}</h1>
        <p class="text-slate-600 text-lg">Browse our currently active learning sessions.</p>
    </div>
</div>

<div class="max-w-6xl mx-auto px-4 py-12">
    <div class="grid md:grid-cols-2 gap-8">
        <!-- Loop through all standalone content files inside content/classrooms/ -->
        {{ range .Pages }}
        <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-xs flex flex-col">
            <div class="p-6 flex-grow">
                <span class="text-xs font-semibold uppercase tracking-wider text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-sm">{{ .Params.subject }}</span>
                <h2 class="text-2xl font-bold text-slate-900 mt-3 mb-2">{{ .Title }}</h2>
                <p class="text-slate-600 line-clamp-3 mb-4">{{ .Summary }}</p>
            </div>
            <div class="bg-slate-50 px-6 py-4 border-t border-slate-100 flex justify-between items-center">
                <span class="text-sm font-medium text-slate-500">Ages: {{ .Params.age_group }}</span>
                <a href="{{ .Permalink }}" class="text-indigo-600 font-semibold hover:text-indigo-800 transition">View Details &rarr;</a>
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
